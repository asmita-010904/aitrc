<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100">
        <h1 class="text-3xl font-extrabold text-center text-indigo-600 mb-2">QR Code Generator</h1>
        <p class="text-slate-500 text-center text-sm mb-6">Convert any link instantly into a scannable QR Code</p>

        <form method="POST" class="space-y-4">
            <div>
                <label for="url_input" class="block text-sm font-semibold text-slate-700 mb-1">Paste your URL:</label>
                <input 
                    type="url" 
                    id="url_input" 
                    name="url_input" 
                    placeholder="https://example.com" 
                    required 
                    value="{{ original_url }}"
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm"
                >
            </div>
            <button 
                type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-md shadow-indigo-200"
            >
                Generate QR Code
            </button>
        </form>

        {% if qr_code %}
            <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col items-center animate-fade-in">
                <p class="text-xs font-medium text-slate-400 mb-4 break-all max-w-full text-center">
                    Generated for: <span class="text-indigo-500 font-semibold">{{ original_url }}</span>
                </p>
                
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner">
                    <img src="data:image/png;base64,{{ qr_code }}" alt="Generated QR Code" class="w-48 h-48">
                </div>

                <a 
                    href="data:image/png;base64,{{ qr_code }}" 
                    download="qrcode.png" 
                    class="mt-5 text-sm font-semibold text-indigo-600 hover:text-indigo-800 flex items-center gap-1 transition-colors"
                >
                    ⬇️ Download QR Code (.png)
                </a>
            </div>
        {% endif %}
    </div>

</body>
</html>
